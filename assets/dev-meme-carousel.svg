<svg width="1000" height="220" viewBox="0 0 1000 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Developer meme carousel</title>
  <desc id="desc">A right-to-left sliding carousel of developer meme cards.</desc>
  <style>
    .bg { fill: #020617; }
    .track-bg { fill: #0b1220; stroke: #263244; stroke-width: 1; }
    .card { fill: #101722; stroke: #334155; stroke-width: 1; }
    .accent { fill: #a6d96a; }
    .cyan { fill: #7dd3fc; }
    .title { fill: #f8fafc; font: 700 18px "JetBrains Mono", "Courier New", monospace; }
    .body { fill: #cbd5e1; font: 500 13px "JetBrains Mono", "Courier New", monospace; }
    .cmd { fill: #a6d96a; font: 700 13px "JetBrains Mono", "Courier New", monospace; }
  </style>

  <rect class="bg" width="1000" height="220" rx="12"/>
  <rect class="track-bg" x="18" y="22" width="964" height="176" rx="10"/>

  <g>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1080 0" dur="24s" repeatCount="indefinite"/>

    <g transform="translate(42 46)">
      <rect class="card" width="235" height="128" rx="8"/>
      <circle class="accent" cx="22" cy="24" r="6"/>
      <text class="title" x="40" y="30">it works locally</text>
      <text class="cmd" x="18" y="68">$ npm run dev</text>
      <text class="body" x="18" y="94">production: "interesting"</text>
    </g>

    <g transform="translate(302 46)">
      <rect class="card" width="235" height="128" rx="8"/>
      <circle class="cyan" cx="22" cy="24" r="6"/>
      <text class="title" x="40" y="30">one more push</text>
      <text class="cmd" x="18" y="68">$ git commit --amend</text>
      <text class="body" x="18" y="94">five commits later...</text>
    </g>

    <g transform="translate(562 46)">
      <rect class="card" width="235" height="128" rx="8"/>
      <circle class="accent" cx="22" cy="24" r="6"/>
      <text class="title" x="40" y="30">CI/CD pipelines</text>
      <text class="cmd" x="18" y="68">status: almost green</text>
      <text class="body" x="18" y="94">the last test knows fear</text>
    </g>

    <g transform="translate(822 46)">
      <rect class="card" width="235" height="128" rx="8"/>
      <circle class="cyan" cx="22" cy="24" r="6"/>
      <text class="title" x="40" y="30">debugging mode</text>
      <text class="cmd" x="18" y="68">print("why")</text>
      <text class="body" x="18" y="94">2 AM enlightenment arc</text>
    </g>

    <g transform="translate(1082 46)">
      <rect class="card" width="235" height="128" rx="8"/>
      <circle class="accent" cx="22" cy="24" r="6"/>
      <text class="title" x="40" y="30">ship first</text>
      <text class="cmd" x="18" y="68">$ make demo</text>
      <text class="body" x="18" y="94">refactor responsibly</text>
    </g>

    <g transform="translate(1342 46)">
      <rect class="card" width="235" height="128" rx="8"/>
      <circle class="cyan" cx="22" cy="24" r="6"/>
      <text class="title" x="40" y="30">README driven</text>
      <text class="cmd" x="18" y="68">docs before sleep</text>
      <text class="body" x="18" y="94">profile polish matters</text>
    </g>

    <g transform="translate(1602 46)">
      <rect class="card" width="235" height="128" rx="8"/>
      <circle class="accent" cx="22" cy="24" r="6"/>
      <text class="title" x="40" y="30">it works locally</text>
      <text class="cmd" x="18" y="68">$ npm run dev</text>
      <text class="body" x="18" y="94">production: "interesting"</text>
    </g>

    <g transform="translate(1862 46)">
      <rect class="card" width="235" height="128" rx="8"/>
      <circle class="cyan" cx="22" cy="24" r="6"/>
      <text class="title" x="40" y="30">one more push</text>
      <text class="cmd" x="18" y="68">$ git commit --amend</text>
      <text class="body" x="18" y="94">five commits later...</text>
    </g>
  </g>
</svg>
